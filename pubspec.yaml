name: secure_pii_wallet
description: "Military-grade encrypted personal information wallet"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  
  # Routing
  go_router: ^14.2.0
  
  # Cryptography
  encrypt: ^5.0.3
  crypto: ^3.0.3
  
  # Secure Storage - Replaced shared_preferences with Hive (no web dependency)
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.3
  
  # File Picker
  file_picker: ^6.1.1
  
  # Utils
  uuid: ^4.4.0
  intl: ^0.19.0
  
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

# Flutter Launcher Icons configuration
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "Secure-PII_Wallet.png"
  adaptive_icon_background: "#0A0E27"
  adaptive_icon_foreground: "Secure-PII_Wallet.png"
