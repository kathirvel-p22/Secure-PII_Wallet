name: secure_pii_wallet
description: "Military-grade encrypted personal information wallet"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'  # Relaxed SDK constraint

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  
  # Routing
  go_router: ^14.2.0
  
  # Cryptography
  encrypt: ^5.0.3
  crypto: ^3.0.3
  
  # Secure Storage - Using shared_preferences (pure Dart, no web issues!)
  shared_preferences: ^2.2.3
  path_provider: ^2.1.3
  
  # File Picker - Using file_picker with specific version that works
  file_picker: ^8.0.0+1
  
  # Utils
  uuid: ^4.4.0
  intl: ^0.19.0
  
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
